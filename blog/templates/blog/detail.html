{% extends "blog/base.html" %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}
<h1>{{ post.title }}</h1>
<p class="meta">By {{ post.author.username }} | {{ post.created_at|date:"F d, Y" }}</p>
<div>{{ post.content|linebreaks }}</div>
<p><a href="{% url 'blog:post_list' %}">Back to posts</a></p>
{% endblock %}
